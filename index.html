<!DOCTYPE html>
<html>
<head>
    <title>Finance Tracker</title>
    <link rel="preconnect" href = "https://fonts.googleapis.com">
    // Lo00ng font link for title
    
    <link href = "https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
     rel="stylesheet">
    
     <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



</head>
<body>

<div class="bg-grid"></div>
<div class=scanlines"></div>
<div class="app-wrapper" 
<!-- not chatgpt wrapper! --> 

<header>
    <h1>FINANCE<span class="title-accent>.EXE"</h1>
<p class ="subtitle"> EXPERIMENTAL PERSONAL LEDGER SYSTEM v1.0</p>

</header>

<div class="app-grid">
<p class="card-label"> // CURRENT BALANCE</p>
<div id="balance">$0.00</div>
<div class="stats-row">
<div class="stat">
<span class="stat-label">INCOME</span>
<span class="stat-value income" id="total-income">$0.00</span>
</div>
<div class="stat-divider"></div>
<div class="stat">
<span class="stat-label">EXPENSES</span>
<span class="stat-value expense" id="total-expense">$0.00</span>
</div>


</div>


</div>





<div class="panel-section">
    <p class="card-label">// CASH FLOW</p>
<div class="chart-wrap">
<canvas id="myChart"></canvas>

</div>

</div>



<div class="panel-section">
    <p class=""card-label>// NEW TRANSACTION</p>
    <form id="transaction-form">
<input type="text" id="desc" placeholder="Description" required>
<input type="number" id="amount" placeholder="Amount" required>
<select id="type">
<option value="income">Income</option>
<option value="expense">expense</option>
</select>

<button>ADD</button>

    </form>

</div>
   
</div>


<div class="right-panel">

<div class="list-header">
<p class="card-label">// TRANSACTION LOG</p>
<span id="tx-count">0 ENTRIES</span>

</div>
<ul id="list"></ul>
</div>
</div>
</div>




<script src="script.js"></script>
</body>
