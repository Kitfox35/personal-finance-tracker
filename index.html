<!DOCTYPE html>
<html>
<head>
    <title>Finance Tracker</title>
    <link rel="preconnect" href = "https://fonts.googleapis.com">
    
    
    <link href = "https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
     rel="stylesheet">
    
     <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



</head>
<body>

<div class="bg-grid"></div>
<div class="scanlines"></div>
<div class="app-wrapper" >


<header>
    <h1>F.I.N.A.N.C.E <span class="title-accent">.EXE</span></h1>

        <p class ="subtitle"> Funds. Income. Notes. Accounts. Numbers. Costs. Entries </p>

</header>

<div class="app-grid"> 
<div class="left-panel">
<div id="balance-card">
<p class="card-label">// CURRENT BALANCE</p>
<div id="balance">$0.00</div>
<div class="stats-row">
<div class="stat">



    <span class="stat-label">INCOME</span>
<span class="stat-value income" id="total-income">$0.00</span>
</div>
<div class="stat-divider"></div>
<div class="stat">
<span class="stat-label">EXPENSES</span>
<span class="stat-value expense" id="total-expense">$0.00</span>
</div>
</div>
</div>
<div class="panel-section">
<p class="card-label">// CASH FLOW</p>

<div class="chart-toggle">
<button class="chart-btn active" id="btn-overview" onclick="switchChart('overview')">Income vs Expenses</button>
<button class="chart-btn" id="btn-category" onclick="switchChart('category')">By Category</button>

</div>




<div class="chart-wrap">
<canvas id="myChart"></canvas>
</div>
</div>
<div class="panel-section">
<p class="card-label">// NEW TRANSACTION</p>





<form id="transaction-form">
<input type="text" id="desc" placeholder="Description" required>
<input type="number" id="amount" placeholder="Amount" required>
<select id="type">
<option value="income">Income</option>
<option value="expense">expense</option>
</select>
<select id="category">
    <option value="Food">Food</option>
    <option value="Bills">Bills</option>
    <option value="Shopping">Shopping</option>
    <option value="School">School</option>
    <option value="Other">Other</option>
</select>





<button type="submit" id="submit-btn">Add</button>
</form>
</div>
</div>
<div class="right-panel">
<div id="budget-section">
<input type="number" id="budget-input" placeholder="Set monthly budget">
<button id="budget-btn" onclick="setBudget()">Set</button>
</div>
<div id="monthly-summary">
<span id="monthly-text">No transactions this month yet.</span>
</div>
<div id="budget-warning" style="display:none;"></div>

<input type="text" id="search" placeholder="Search transactions...">



<div class="list-header">
<p class="card-label">// TRANSACTION LOG</p>
<span id="tx-count">0 ENTRIES</span>
</div>
<ul id="list"></ul>
</div>
</div> 


<script src="script.js"></script>
</body>
